<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mis Viajes</title>
<!-- icons removed for compatibility -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
 --gd:#0F6E56;--gm:#1D9E75;--gl:#E1F5EE;--gb:#9FE1CB;
 --am:#BA7517;--al:#FAEEDA;--rm:#D85A30;--rl:#FAECE7;--rb:#F5C4B3;
 --bm:#185FA5;--bl:#E6F1FB;--bb:#B5D4F4;
 --txt:#1a1a18;--txt2:#6b6b67;--bg:#f0ede8;--card:#ffffff;
 --brd:rgba(0,0,0,0.10);--brd2:rgba(0,0,0,0.20);--r:12px;--rl2:16px;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--txt);font-size:16px;line-height:1.5;}
.header{background:var(--gd);padding:16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.header-logos{display:flex;align-items:center;gap:10px;}
.header-logos img{height:34px;width:auto;object-fit:contain;border-radius:5px;}
.header-div{width:1px;height:26px;background:rgba(255,255,255,0.25);}
.header-user{display:flex;align-items:center;gap:8px;}
.header-name{font-size:13px;color:rgba(255,255,255,0.9);font-weight:500;}
.btn-salir{background:rgba(255,255,255,0.15);border:0.5px solid rgba(255,255,255,0.3);border-radius:20px;padding:5px 12px;font-size:12px;color:white;cursor:pointer;}
.sync-bar{background:rgba(0,0,0,0.15);padding:5px 0 0;display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#7FFFD4;}
.sync-dot.on{background:#FFD700;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-txt{font-size:11px;color:rgba(255,255,255,0.8);}
.main{padding:16px;}
/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;}
.login-card{background:var(--card);border-radius:var(--rl2);padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.10);}
.login-logos{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;}
.login-logos img{height:40px;width:auto;object-fit:contain;border-radius:6px;}
.login-logos .div{width:1px;height:32px;background:var(--brd2);}
.login-card h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px;}
.login-card p{font-size:14px;color:var(--txt2);text-align:center;margin-bottom:24px;}
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.input-group label{font-size:13px;font-weight:500;color:var(--txt2);}
.input-group input{padding:14px 16px;border:1.5px solid var(--brd2);border-radius:var(--r);font-size:16px;background:var(--bg);color:var(--txt);width:100%;}
.input-group input:focus{outline:none;border-color:var(--gm);}
.btn-login{width:100%;padding:15px;background:var(--gm);color:white;border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:active{background:var(--gd);}
.login-error{background:var(--rl);border:1px solid var(--rb);border-radius:var(--r);padding:12px 16px;font-size:14px;color:var(--rm);text-align:center;margin-top:12px;display:none;}
/* LISTA */
.viaje-card{background:var(--card);border-radius:var(--rl2);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;}
.viaje-card:active{transform:scale(0.98);}
.vlc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vlc-id{font-size:12px;font-weight:600;color:var(--gd);}
.vlc-patente{font-size:18px;font-weight:700;margin-bottom:2px;}
.vlc-dest{font-size:14px;color:var(--txt2);}
.vlc-hora{font-size:13px;color:var(--gd);font-weight:600;margin-top:4px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-blue{background:var(--bl);color:var(--bm);}
.badge-purple{background:#F3E8FF;color:#6B21A8;}
.badge-warn{background:var(--al);color:var(--am);}
.badge-danger{background:var(--rl);color:var(--rm);}
.badge-ok{background:var(--gl);color:var(--gd);}
.badge-gray{background:#e5e5e3;color:var(--txt2);}
.prog-wrap{margin-top:10px;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:4px;}
.prog-bar{height:8px;background:#e5e5e3;border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--gm);transition:width .4s;}
.vlc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.vlc-fecha{font-size:12px;color:var(--txt2);}
.vlc-ver{font-size:12px;color:var(--gd);font-weight:500;}
/* AVISOS */
.aviso{border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px;}
.aviso-seg{background:#FAECE7;border:1.5px solid #F5C4B3;}
.aviso-info{background:var(--bl);border:1.5px solid var(--bb);}
.aviso-urg{background:#FAEEDA;border:1.5px solid #F5A623;}
.aviso i{font-size:22px;flex-shrink:0;margin-top:2px;}
.aviso-seg i{color:#D85A30;} .aviso-info i{color:var(--bm);} .aviso-urg i{color:#BA7517;}
.aviso-titulo{font-size:14px;font-weight:700;margin-bottom:3px;}
.aviso-seg .aviso-titulo{color:#D85A30;} .aviso-info .aviso-titulo{color:var(--bm);} .aviso-urg .aviso-titulo{color:#BA7517;}
.aviso-texto{font-size:13px;color:var(--txt);line-height:1.5;}
/* DETALLE */
.btn-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--gd);font-size:15px;font-weight:500;cursor:pointer;padding:0;margin-bottom:16px;}
.estado-card{background:var(--card);border-radius:var(--rl2);padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.estado-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.estado-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.estado-icon i{font-size:24px;}
.estado-titulo{font-size:17px;font-weight:700;}
.estado-sub{font-size:13px;color:var(--txt2);margin-top:2px;}
.hora-box{background:var(--gd);border-radius:var(--r);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.hora-box i{font-size:28px;color:rgba(255,255,255,0.8);flex-shrink:0;}
.hora-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.hora-val{font-size:30px;font-weight:800;color:white;}
.steps-bar{display:flex;margin-bottom:14px;border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);}
.step-m{flex:1;padding:8px 4px;text-align:center;font-size:10px;background:#f5f5f4;color:var(--txt2);display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--brd);}
.step-m:last-child{border-right:none;}
.step-m.done{background:var(--gl);color:var(--gd);}
.step-m.active{background:var(--gd);color:white;}
.step-m i{font-size:16px;}
.info-section{background:#f8f7f5;border-radius:var(--r);padding:14px;margin-bottom:12px;}
.info-section-title{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:13px;color:var(--txt2);}
.info-val{font-size:14px;font-weight:600;color:var(--txt);text-align:right;}
.remito-item{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;border-left:3px solid var(--gm);}
.diff-box{border-radius:var(--r);padding:16px;margin-bottom:12px;text-align:center;}
.diff-ok{background:var(--gl);border:1.5px solid var(--gb);}
.diff-danger{background:var(--rl);border:1.5px solid var(--rb);}
.diff-num{font-size:30px;font-weight:700;margin:6px 0 4px;}
/* BUEN VIAJE */
.bv-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 120px);padding:32px 24px;text-align:center;}
.bv-circle{width:120px;height:120px;border-radius:50%;background:var(--gl);border:4px solid var(--gm);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.bv-circle i{font-size:60px;color:var(--gd);}
.bv-titulo{font-size:26px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.bv-sub{font-size:15px;color:var(--txt2);margin-bottom:24px;}
.bv-datos{background:var(--card);border-radius:var(--rl2);padding:20px;width:100%;max-width:340px;margin-bottom:24px;}
.bv-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:14px;}
.bv-row:last-child{border-bottom:none;}
.btn-volver{background:var(--gm);color:white;border:none;border-radius:var(--r);padding:15px 32px;font-size:16px;font-weight:600;cursor:pointer;}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.empty{text-align:center;padding:40px 20px;}
.empty i{font-size:56px;color:#ccc;display:block;margin-bottom:12px;}
.empty h3{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:6px;}
.empty p{font-size:14px;color:var(--txt2);}
.update-time{text-align:center;font-size:11px;color:var(--txt2);padding:8px 0 16px;}
.hidden{display:none!important;}
</style>
</head>

<script>
const SUPA_URL='https://cqdoritjnulopaysjlfg.supabase.co';
const SUPA_KEY='sb_publishable__n5ncv0PQuqcFftL8pT_RQ_IeV4gqSf';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

let choferActual=null;
let viajesActuales=[];
let remitosCache={};
let viajeDetalleId=null;
let rtChannel=null;

// LOGIN
async function buscarChofer(){
 var dniInput=document.getElementById('inputDni');
 var err=document.getElementById('loginError');
 var btn=document.querySelector('.btn-login');
 if(!dniInput){alert('ERROR: no encuentra inputDni');return;}
 var dni=dniInput.value.toString().trim();
 if(!dni){err.textContent='Ingresá tu DNI.';err.style.display='block';return;}
 err.style.display='none';
 btn.textContent='Buscando...';btn.disabled=true;
 try{
  var resp=await db.from('choferes').select('*');
  if(resp.error){
   err.textContent='Error DB: '+resp.error.message;
   err.style.display='block';
   btn.textContent='Ver mis viajes';btn.disabled=false;
   return;
  }
  var lista=resp.data||[];
  var match=null;
  for(var i=0;i<lista.length;i++){
   if(lista[i].dni&&String(lista[i].dni).trim()===dni){match=lista[i];break;}
  }
  if(!match){
   var dnisDB=lista.map(function(c){return c.dni;}).join(', ');
   err.textContent='DNI '+dni+' no encontrado. En sistema: ['+dnisDB+']';
   err.style.display='block';
   btn.textContent='Ver mis viajes';btn.disabled=false;
   return;
  }
  choferActual=match;
  try{localStorage.setItem('chofer_dni',dni);}catch(le){}
  iniciarApp();
 }catch(e){
  err.textContent='Excepcion: '+e.message;
  err.style.display='block';
  btn.textContent='Ver mis viajes';btn.disabled=false;
 }
}


function iniciarApp(){
 document.getElementById('loginScreen').classList.add('hidden');
 document.getElementById('appScreen').classList.remove('hidden');
 document.getElementById('headerNombre').textContent=choferActual.nombre;
 iniciarRealtime();
 cargarViajes();
 cargarAvisos();
}

function salir(){
 if(rtChannel)db.removeChannel(rtChannel);
 choferActual=null;viajesActuales=[];remitosCache={};viajeDetalleId=null;
 localStorage.removeItem('chofer_dni');
 document.getElementById('appScreen').classList.add('hidden');
 document.getElementById('loginScreen').classList.remove('hidden');
 document.getElementById('inputDni').value='';
}

// REALTIME
function iniciarRealtime(){
 if(rtChannel)db.removeChannel(rtChannel);
 rtChannel=db.channel('chofer-rt-'+Date.now())
 .on('postgres_changes',{event:'*',schema:'public',table:'viajes'},()=>cargarViajes())
 .on('postgres_changes',{event:'*',schema:'public',table:'remitos'},()=>cargarViajes())
 .subscribe(status=>{
 const dot=document.getElementById('syncDot');
 const txt=document.getElementById('syncTxt');
 if(status==='SUBSCRIBED'){dot.classList.remove('on');txt.textContent='Conectado — tiempo real';}
 else{dot.classList.add('on');txt.textContent='Reconectando...';setTimeout(()=>{if(choferActual)iniciarRealtime();},3000);}
 });
 if(window._poll)clearInterval(window._poll);
 window._poll=setInterval(()=>{if(choferActual)cargarViajes();},20000);
}

// AVISOS
async function cargarAvisos(){
 const cont=document.getElementById('avisosContainer');
 if(!cont)return;
 try{
 const{data}=await db.from('avisos').select('*').eq('activo',true).order('created_at',{ascending:false});
 if(!data||!data.length){cont.innerHTML='';return;}
 const clsMap={seguridad:'aviso-seg',info:'aviso-info',urgente:'aviso-urg'};
 const iconMap={seguridad:'ti-shield-exclamation',info:'ti-info-circle',urgente:'ti-alert-triangle'};
 let html='';
 data.forEach(a=>{
 const cls=clsMap[a.tipo]||'aviso-info';
 const icon=iconMap[a.tipo]||'ti-info-circle';
 html+='<div class="aviso '+cls+'"><i class="ti '+icon+'"></i><div><div class="aviso-titulo">'+a.titulo+'</div><div class="aviso-texto">'+a.mensaje+'</div></div></div>';
 });
 cont.innerHTML=html;
 }catch(e){console.error('Avisos error:',e);}
}

// CARGAR VIAJES
async function cargarViajes(){
 if(!choferActual)return;
 try{
 const{data:vd}=await db.from('viajes').select('*').eq('chofer',choferActual.nombre).order('created_at',{ascending:false});
 const{data:rd}=await db.from('remitos').select('*');
 const todos=vd||[];
 remitosCache={};
 (rd||[]).forEach(r=>{
 if(!remitosCache[r.viaje_id])remitosCache[r.viaje_id]=[];
 remitosCache[r.viaje_id].push(r);
 });
 // Detectar cierre en tiempo real
 if(viajeDetalleId){
 const v=todos.find(x=>x.id===viajeDetalleId);
 if(v&&v.estado==='cerrado'){
 mostrarBuenViaje(v);
 viajeDetalleId=null;
 viajesActuales=todos.filter(x=>x.estado!=='cerrado');
 return;
 }
 if(v)renderDetalle(v);
 }
 viajesActuales=todos.filter(x=>x.estado!=='cerrado');
 const now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
 const ut='Actualizado: '+now;
 const el1=document.getElementById('updateTime');if(el1)el1.textContent=ut;
 const el2=document.getElementById('updateTimeDetalle');if(el2)el2.textContent=ut;
 if(!document.getElementById('vistaBuenViaje').classList.contains('hidden'))return;
 if(!viajeDetalleId)renderLista();
 }catch(e){console.error('cargarViajes error:',e);}
}

// ESTADO INFO
function estadoInfo(estado){
 const m={
 'asignado': {badge:'badge-blue',icon:'ti-clock',titulo:'Viaje asignado',sub:'Dirigite a báscula para el pesaje de tara.',prog:10,step:0},
 'espera-remitos':{badge:'badge-purple',icon:'ti-file-text',titulo:'Esperando remitos',sub:'Logística está cargando los remitos.',prog:40,step:1},
 'en-remitos': {badge:'badge-purple',icon:'ti-file-text',titulo:'Cargando remitos',sub:'Logística está registrando los remitos.',prog:45,step:1},
 'listo-bruto': {badge:'badge-warn',icon:'ti-scale',titulo:'Listo para pesaje bruto',sub:'Dirigite a báscula para el pesaje bruto.',prog:70,step:2},
 'en-bruto': {badge:'badge-warn',icon:'ti-scale',titulo:'Pesando bruto',sub:'Se está registrando el peso bruto.',prog:85,step:2},
 'pendiente-auth':{badge:'badge-danger',icon:'ti-alert-circle',titulo:'Diferencia detectada',sub:'El Supervisor está revisando el caso.',prog:90,step:3},
 'pendiente-gerente':{badge:'badge-danger',icon:'ti-alert-circle',titulo:'Diferencia crítica',sub:'Pendiente doble autorización.',prog:90,step:3},
 'pendiente-gerente-final':{badge:'badge-purple',icon:'ti-crown',titulo:'Pendiente Gerente',sub:'El Gerente Industrial debe autorizar.',prog:95,step:3},
 'cerrado': {badge:'badge-ok',icon:'ti-circle-check',titulo:'Viaje cerrado',sub:'Tu viaje fue cerrado correctamente.',prog:100,step:3},
 };
 return m[estado]||{badge:'badge-gray',icon:'ti-clock',titulo:estado,sub:'',prog:0,step:0};
}

// RENDER LISTA
function renderLista(){
 const cont=document.getElementById('viajesContainer');
 if(!viajesActuales.length){
 cont.innerHTML='<div class="empty"><h3>Sin viajes activos</h3><p>No tenés viajes asignados en este momento.</p></div>';
 return;
 }
 let html='';
 viajesActuales.forEach(v=>{
 const ei=estadoInfo(v.estado);
 const fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
 html+='<div class="viaje-card" onclick="verDetalle(''+v.id+'')">';
 html+='<div class="vlc-top"><span class="vlc-id">'+(v.id_viaje||'—')+'</span><span class="badge '+ei.badge+'">'+ei.titulo+'</span></div>';
 html+='<div class="vlc-patente">'+v.patente+(v.patente_acoplado?' / '+v.patente_acoplado:'')+'</div>';
 html+='<div class="vlc-dest">'+v.destino+'</div>';
 if(v.hora_ingreso)html+='<div class="vlc-hora">Ingreso estimado: '+v.hora_ingreso+'</div>';
 html+='<div class="prog-wrap"><div class="prog-labels"><span>Progreso</span><span>'+ei.prog+'%</span></div>';
 html+='<div class="prog-bar"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div></div>';
 html+='<div class="vlc-footer"><span class="vlc-fecha">'+fecha+'</span><span class="vlc-ver">Ver detalle </span></div>';
 html+='</div>';
 });
 cont.innerHTML=html;
}

// VER DETALLE
function verDetalle(id){
 viajeDetalleId=id;
 const v=viajesActuales.find(x=>x.id===id);
 if(!v)return;
 document.getElementById('vistaLista').classList.add('hidden');
 document.getElementById('vistaDetalle').classList.remove('hidden');
 renderDetalle(v);
}

function volverLista(){
 viajeDetalleId=null;
 document.getElementById('vistaDetalle').classList.add('hidden');
 document.getElementById('vistaBuenViaje').classList.add('hidden');
 document.getElementById('vistaLista').classList.remove('hidden');
 renderLista();
}

function renderDetalle(v){
 const ei=estadoInfo(v.estado);
 const remitos=remitosCache[v.id]||[];
 const dec=remitos.reduce((s,r)=>s+Number(r.peso),0);
 const neto=Number(v.bruto)-Number(v.tara);
 const diff=neto-dec;
 const absDiff=Math.abs(diff);
 const pct=dec>0?((absDiff/dec)*100).toFixed(2):'0.00';
 const signo=diff>=0?'+':'';
 const fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
 const stepIcons=['ti-scale','ti-file-text','ti-scale','ti-shield-check'];
 const stepLabels=['Tara','Remitos','Bruto','Control'];
 let steps='';
 stepLabels.forEach((l,i)=>{
 const cls=i<ei.step?'done':i===ei.step?'active':'';
 steps+='<div class="step-m '+cls+'"><i class="ti '+stepIcons[i]+'"></i><span>'+l+'</span></div>';
 });
 let html='';
 // Hora de ingreso destacada
 if(v.hora_ingreso){
 html+='<div class="hora-box"><div><div class="hora-label">Hora estimada de ingreso a planta</div><div class="hora-val">'+v.hora_ingreso+'</div></div></div>';
 }
 // Estado
 html+='<div class="estado-card">';
 html+='<div class="estado-header"><div class="estado-icon" style="background:#f0f0ee;"><i class="ti '+ei.icon+'" style="font-size:24px;color:var(--gd);"></i></div>';
 html+='<div><div class="estado-titulo">'+ei.titulo+'</div><div class="estado-sub">'+ei.sub+'</div></div></div>';
 html+='<div class="prog-wrap"><div class="prog-labels"><span>Progreso del viaje</span><span>'+ei.prog+'%</span></div>';
 html+='<div class="prog-bar"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div></div>';
 html+='<div class="steps-bar">'+steps+'</div>';
 html+='</div>';
 // Datos
 html+='<div class="info-section"><div class="info-section-title">Datos del viaje</div>';
 html+='<div class="info-row"><span class="info-lbl">ID Viaje</span><span class="info-val">'+(v.id_viaje||'—')+'</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Patente tractora</span><span class="info-val">'+v.patente+'</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Patente acoplado</span><span class="info-val">'+(v.patente_acoplado||'—')+'</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Destino</span><span class="info-val">'+v.destino+'</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Fecha</span><span class="info-val">'+fecha+'</span></div>';
 if(v.obs)html+='<div class="info-row"><span class="info-lbl">Observaciones</span><span class="info-val">'+v.obs+'</span></div>';
 html+='</div>';
 // Tara
 if(Number(v.tara)>0){
 html+='<div class="info-section"><div class="info-section-title">Pesaje de tara</div>';
 html+='<div class="info-row"><span class="info-lbl">Peso tara</span><span class="info-val">'+Number(v.tara).toLocaleString('es-AR')+' kg</span></div>';
 html+='</div>';
 }
 // Remitos
 if(remitos.length){
 html+='<div class="info-section"><div class="info-section-title">Remitos ('+remitos.length+')</div>';
 remitos.forEach(r=>{
 html+='<div class="remito-item"><div style="font-size:12px;color:var(--txt2);">Remito '+r.num+'</div>';
 html+='<div style="font-size:15px;font-weight:600;">'+r.producto+'</div>';
 html+='<div style="font-size:14px;color:var(--gd);font-weight:500;">'+Number(r.peso).toLocaleString('es-AR')+' kg</div></div>';
 });
 html+='<div class="info-row" style="margin-top:8px;"><span class="info-lbl" style="font-weight:600;">Total declarado</span><span class="info-val" style="color:var(--gd);">'+dec.toLocaleString('es-AR')+' kg</span></div>';
 html+='</div>';
 }
 // Bruto y diferencia
 if(Number(v.bruto)>0){
 html+='<div class="info-section"><div class="info-section-title">Pesaje bruto</div>';
 html+='<div class="info-row"><span class="info-lbl">Peso bruto</span><span class="info-val">'+Number(v.bruto).toLocaleString('es-AR')+' kg</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Peso neto real</span><span class="info-val">'+neto.toLocaleString('es-AR')+' kg</span></div>';
 html+='<div class="info-row"><span class="info-lbl">Peso declarado</span><span class="info-val">'+dec.toLocaleString('es-AR')+' kg</span></div>';
 html+='</div>';
 const ok=v.estado==='en-bruto';
 html+='<div class="diff-box '+(ok?'diff-ok':'diff-danger')+'">';
 html+='<div style="font-size:13px;font-weight:600;color:'+(ok?'var(--gd)':'var(--rm)')+';">'+(ok?'Pesada aprobada':'Diferencia detectada')+'</div>';
 html+='<div class="diff-num" style="color:'+(ok?'var(--gd)':'var(--rm)')+';">'+signo+diff.toLocaleString('es-AR')+' kg</div>';
 html+='<div style="font-size:13px;color:var(--txt2);">'+signo+pct+'% respecto a lo declarado</div>';
 if(!ok)html+='<div style="font-size:12px;margin-top:8px;color:var(--rm);">El Supervisor/Gerente está revisando el caso.</div>';
 html+='</div>';
 }
 document.getElementById('detalleContainer').innerHTML=html;
}

// BUEN VIAJE
function mostrarBuenViaje(v){
 document.getElementById('vistaLista').classList.add('hidden');
 document.getElementById('vistaDetalle').classList.add('hidden');
 document.getElementById('vistaBuenViaje').classList.remove('hidden');
 const remitos=remitosCache[v.id]||[];
 const dec=remitos.reduce((s,r)=>s+Number(r.peso),0);
 const neto=Number(v.bruto)-Number(v.tara);
 const diff=neto-dec;
 const absDiff=Math.abs(diff);
 const fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
 const fueOk=absDiff===0||absDiff<=(dec*0.005);
 const circ=document.getElementById('bvCircle');
 if(fueOk){
 circ.style.background='var(--gl)';circ.style.borderColor='var(--gm)';circ.querySelector('i').style.color='var(--gd)';
 document.getElementById('bvTitulo').textContent='¡Buen viaje!';document.getElementById('bvTitulo').style.color='var(--gd)';
 document.getElementById('bvSub').textContent='Tu viaje fue procesado y cerrado correctamente.';
 lanzarConfetti();
 }else{
 circ.style.background='#FAEEDA';circ.style.borderColor='#BA7517';circ.querySelector('i').style.color='#BA7517';
 document.getElementById('bvTitulo').textContent='Viaje autorizado';document.getElementById('bvTitulo').style.color='#BA7517';
 document.getElementById('bvSub').textContent='Tu viaje fue cerrado con diferencia de peso autorizada.';
 }
 let datos='';
 datos+='<div class="bv-row"><span style="color:var(--txt2);">ID Viaje</span><span style="font-weight:600;">'+(v.id_viaje||'—')+'</span></div>';
 datos+='<div class="bv-row"><span style="color:var(--txt2);">Patente</span><span style="font-weight:600;">'+v.patente+'</span></div>';
 datos+='<div class="bv-row"><span style="color:var(--txt2);">Destino</span><span style="font-weight:600;">'+v.destino+'</span></div>';
 datos+='<div class="bv-row"><span style="color:var(--txt2);">Fecha</span><span style="font-weight:600;">'+fecha+'</span></div>';
 if(Number(v.bruto)>0)datos+='<div class="bv-row"><span style="color:var(--txt2);">Peso neto</span><span style="font-weight:600;">'+neto.toLocaleString('es-AR')+' kg</span></div>';
 document.getElementById('bvDatos').innerHTML=datos;
}

function lanzarConfetti(){
 const wrap=document.getElementById('confettiWrap');wrap.innerHTML='';
 const cols=['#1D9E75','#0F6E56','#FFD700','#FF6B6B','#4ECDC4','#45B7D1'];
 for(let i=0;i<60;i++){
 const p=document.createElement('div');p.className='confetti-piece';
 p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*cols.length)];
 p.style.width=(Math.random()*10+5)+'px';p.style.height=(Math.random()*10+5)+'px';
 p.style.animationDuration=(Math.random()*2+1.5)+'s';p.style.animationDelay=(Math.random()*1.5)+'s';
 p.style.borderRadius=Math.random()>0.5?'50%':'2px';
 wrap.appendChild(p);
 }
 setTimeout(()=>wrap.innerHTML='',4000);
}

// RESTAURAR SESION
window.addEventListener('load',async()=>{
 const dni=localStorage.getItem('chofer_dni');
 if(dni){
 document.getElementById('inputDni').value=dni;
 try{
 const{data}=await db.from('choferes').select('*').eq('activo',true);
 const match=(data||[]).find(c=>c.dni&&c.dni.toString().trim()===dni.trim());
 if(match){choferActual=match;iniciarApp();return;}
 }catch(e){console.error(e);}
 localStorage.removeItem('chofer_dni');
 }
});

document.addEventListener('visibilitychange',()=>{
 if(document.visibilityState==='visible'&&choferActual)cargarViajes();
});
</script>
