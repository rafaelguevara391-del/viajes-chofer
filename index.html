<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Viajes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;padding:20px;background:#f0ede8;}
.card{background:white;border-radius:12px;padding:24px;max-width:400px;margin:40px auto;}
h2{text-align:center;margin-bottom:16px;}
input{width:100%;padding:14px;font-size:16px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px;box-sizing:border-box;}
button{width:100%;padding:14px;font-size:16px;background:#1D9E75;color:white;border:none;border-radius:8px;cursor:pointer;}
#msg{margin-top:12px;padding:12px;border-radius:8px;font-size:14px;display:none;}
#app{display:none;padding:20px;max-width:400px;margin:0 auto;}
.viaje{background:white;border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#E1F5EE;color:#0F6E56;}
.btn-back{background:none;border:none;color:#1D9E75;font-size:15px;cursor:pointer;padding:0;margin-bottom:16px;}
.sec{background:#f8f7f5;border-radius:8px;padding:14px;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.08);font-size:14px;}
.row:last-child{border-bottom:none;}
.lbl{color:#6b6b67;}
.val{font-weight:600;}
.prog{height:8px;background:#e5e5e3;border-radius:4px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:4px;background:#1D9E75;}
</style>
</head>
<body>
<div id="login">
  <div class="card">
    <h2>Mis Viajes</h2>
    <p style="text-align:center;color:#6b6b67;margin-bottom:20px;">Ingresa tu DNI para ver tus viajes</p>
    <input type="number" id="dni" placeholder="Tu DNI" inputmode="numeric">
    <button id="btnEntrar">Ver mis viajes</button>
    <div id="msg"></div>
  </div>
</div>
<div id="app">
  <div style="max-width:400px;margin:0 auto;padding:16px;">
    <div style="background:#0F6E56;color:white;padding:16px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
      <span id="saludo" style="font-weight:600;"></span>
      <button id="btnSalir" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:13px;">Salir</button>
    </div>
    <div id="vistaLista">
      <div id="avisos"></div>
      <div id="viajes"></div>
    </div>
    <div id="vistaDetalle" style="display:none;">
      <button class="btn-back" id="btnVolver">&#8592; Volver</button>
      <div id="detalle"></div>
    </div>
  </div>
</div>
<script>
var db=supabase.createClient('https://cqdoritjnulopaysjlfg.supabase.co','sb_publishable__n5ncv0PQuqcFftL8pT_RQ_IeV4gqSf');
var chofer=null,misViajes=[],misRemitos={},detalleId=null;

document.getElementById('btnEntrar').addEventListener('click',entrar);
document.getElementById('dni').addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
document.getElementById('btnSalir').addEventListener('click',salir);
document.getElementById('btnVolver').addEventListener('click',function(){
  detalleId=null;
  document.getElementById('vistaDetalle').style.display='none';
  document.getElementById('vistaLista').style.display='block';
});
document.getElementById('btnVolverLista') && document.getElementById('btnVolverLista').addEventListener('click',function(){
  detalleId=null;
  document.getElementById('vistaDetalle').style.display='none';
  document.getElementById('vistaLista').style.display='block';
});

function msg(txt,ok){
  var el=document.getElementById('msg');
  el.textContent=txt;el.style.display='block';
  el.style.background=ok?'#E1F5EE':'#FAECE7';
  el.style.color=ok?'#0F6E56':'#D85A30';
}

async function entrar(){
  var dni=document.getElementById('dni').value.toString().trim();
  var btn=document.getElementById('btnEntrar');
  if(!dni){msg('Ingresa tu DNI.',false);return;}
  btn.textContent='Buscando...';btn.disabled=true;
  try{
    var r=await db.from('choferes').select('*').eq('activo',true);
    if(r.error)throw new Error(r.error.message);
    var found=null;
    for(var i=0;i<(r.data||[]).length;i++){
      if(String(r.data[i].dni).trim()===dni){found=r.data[i];break;}
    }
    if(!found){msg('DNI '+dni+' no encontrado.',false);btn.textContent='Ver mis viajes';btn.disabled=false;return;}
    chofer=found;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('saludo').textContent='Hola, '+chofer.nombre;
    cargar();
  }catch(e){msg('Error: '+e.message,false);btn.textContent='Ver mis viajes';btn.disabled=false;}
}

function salir(){
  chofer=null;misViajes=[];misRemitos={};detalleId=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='block';
  document.getElementById('dni').value='';
  document.getElementById('btnEntrar').textContent='Ver mis viajes';
  document.getElementById('btnEntrar').disabled=false;
  document.getElementById('msg').style.display='none';
}

async function cargar(){
  try{
    var r=await db.from('viajes').select('*').eq('chofer',chofer.nombre).order('created_at',{ascending:false});
    var rd=await db.from('remitos').select('*');
    misViajes=(r.data||[]).filter(function(v){return v.estado!=='cerrado';});
    misRemitos={};
    (rd.data||[]).forEach(function(x){if(!misRemitos[x.viaje_id])misRemitos[x.viaje_id]=[];misRemitos[x.viaje_id].push(x);});
    renderLista();
    cargarAvisos();
    if(detalleId){var v=misViajes.find(function(x){return x.id===detalleId;});if(v)renderDetalle(v);}
  }catch(e){document.getElementById('viajes').innerHTML='<p style="color:red;">Error: '+e.message+'</p>';}
  setTimeout(function(){if(chofer)cargar();},15000);
}

async function cargarAvisos(){
  try{
    var r=await db.from('avisos').select('*').eq('activo',true).order('created_at',{ascending:false});
    var cont=document.getElementById('avisos');
    if(!r.data||!r.data.length){cont.innerHTML='';return;}
    var clsM={seguridad:'#FAECE7',info:'#E6F1FB',urgente:'#FAEEDA'};
    var html='';
    r.data.forEach(function(a){
      var bg=clsM[a.tipo]||'#E6F1FB';
      html+='<div style="background:'+bg+';border-radius:8px;padding:12px;margin-bottom:10px;"><strong>'+a.titulo+'</strong><br><span style="font-size:13px;">'+a.mensaje+'</span></div>';
    });
    cont.innerHTML=html;
  }catch(e){}
}

var estadoMap={
  'asignado':         {tit:'Viaje asignado',        prog:10},
  'espera-remitos':   {tit:'Esperando remitos',      prog:40},
  'en-remitos':       {tit:'Cargando remitos',       prog:45},
  'listo-bruto':      {tit:'Listo para pesaje bruto',prog:70},
  'en-bruto':         {tit:'Pesando bruto',          prog:85},
  'pendiente-auth':   {tit:'Diferencia detectada',   prog:90},
  'pendiente-gerente':{tit:'Diferencia critica',     prog:90},
  'pendiente-gerente-final':{tit:'Pendiente Gerente',prog:95},
  'cerrado':          {tit:'Cerrado',                prog:100}
};

function renderLista(){
  var cont=document.getElementById('viajes');
  if(!misViajes.length){cont.innerHTML='<p style="text-align:center;color:#6b6b67;padding:20px;">No tenes viajes activos.</p>';return;}
  var html='';
  misViajes.forEach(function(v){
    var ei=estadoMap[v.estado]||{tit:v.estado,prog:0};
    var fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
    html+='<div class="viaje" data-id="'+v.id+'">';
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:12px;font-weight:600;color:#0F6E56;">'+(v.id_viaje||'—')+'</span><span class="badge">'+ei.tit+'</span></div>';
    html+='<div style="font-size:18px;font-weight:700;">'+v.patente+(v.patente_acoplado?' / '+v.patente_acoplado:'')+'</div>';
    html+='<div style="font-size:14px;color:#6b6b67;">'+v.destino+'</div>';
    if(v.hora_ingreso)html+='<div style="font-size:13px;color:#0F6E56;font-weight:600;margin-top:4px;">&#128336; Ingreso: '+v.hora_ingreso+'</div>';
    html+='<div class="prog"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div>';
    html+='<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:#6b6b67;"><span>'+fecha+'</span><span style="color:#1D9E75;font-weight:500;">Ver detalle &#8250;</span></div>';
    html+='</div>';
  });
  cont.innerHTML=html;
  cont.querySelectorAll('.viaje').forEach(function(el){
    el.addEventListener('click',function(){
      var id=this.getAttribute('data-id');
      var v=misViajes.find(function(x){return x.id===id;});
      if(!v)return;
      detalleId=id;
      document.getElementById('vistaLista').style.display='none';
      document.getElementById('vistaDetalle').style.display='block';
      renderDetalle(v);
    });
  });
}

function renderDetalle(v){
  var rems=misRemitos[v.id]||[];
  var dec=rems.reduce(function(s,r){return s+Number(r.peso);},0);
  var neto=Number(v.bruto)-Number(v.tara);
  var diff=neto-dec;
  var pct=dec>0?((Math.abs(diff)/dec)*100).toFixed(2):'0.00';
  var signo=diff>=0?'+':'';
  var fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
  var ei=estadoMap[v.estado]||{tit:v.estado,prog:0};
  var html='';
  if(v.hora_ingreso){
    html+='<div style="background:#0F6E56;color:white;border-radius:8px;padding:14px 18px;margin-bottom:12px;">';
    html+='<div style="font-size:11px;opacity:0.75;text-transform:uppercase;letter-spacing:.05em;">Hora estimada de ingreso</div>';
    html+='<div style="font-size:30px;font-weight:800;">'+v.hora_ingreso+'</div></div>';
  }
  html+='<div class="sec"><div style="font-weight:600;margin-bottom:8px;">'+ei.tit+'</div>';
  html+='<div class="prog"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div></div>';
  html+='<div class="sec">';
  html+='<div class="row"><span class="lbl">ID Viaje</span><span class="val">'+(v.id_viaje||'—')+'</span></div>';
  html+='<div class="row"><span class="lbl">Patente</span><span class="val">'+v.patente+'</span></div>';
  if(v.patente_acoplado)html+='<div class="row"><span class="lbl">Acoplado</span><span class="val">'+v.patente_acoplado+'</span></div>';
  html+='<div class="row"><span class="lbl">Destino</span><span class="val">'+v.destino+'</span></div>';
  html+='<div class="row"><span class="lbl">Fecha</span><span class="val">'+fecha+'</span></div>';
  html+='</div>';
  if(Number(v.tara)>0){
    html+='<div class="sec"><div style="font-weight:600;margin-bottom:8px;">Pesaje de tara</div>';
    html+='<div class="row"><span class="lbl">Peso tara</span><span class="val">'+Number(v.tara).toLocaleString('es-AR')+' kg</span></div></div>';
  }
  if(rems.length){
    html+='<div class="sec"><div style="font-weight:600;margin-bottom:8px;">Remitos ('+rems.length+')</div>';
    rems.forEach(function(r){
      html+='<div style="background:white;border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid #1D9E75;">';
      html+='<div style="font-size:12px;color:#6b6b67;">Remito '+r.num+'</div>';
      html+='<div style="font-weight:600;">'+r.producto+'</div>';
      html+='<div style="color:#0F6E56;font-weight:500;">'+Number(r.peso).toLocaleString('es-AR')+' kg</div></div>';
    });
    html+='<div class="row"><span class="lbl" style="font-weight:600;">Total declarado</span><span class="val" style="color:#0F6E56;">'+dec.toLocaleString('es-AR')+' kg</span></div>';
    html+='</div>';
  }
  if(Number(v.bruto)>0){
    html+='<div class="sec"><div style="font-weight:600;margin-bottom:8px;">Pesaje bruto</div>';
    html+='<div class="row"><span class="lbl">Peso bruto</span><span class="val">'+Number(v.bruto).toLocaleString('es-AR')+' kg</span></div>';
    html+='<div class="row"><span class="lbl">Neto real</span><span class="val">'+neto.toLocaleString('es-AR')+' kg</span></div>';
    html+='<div class="row"><span class="lbl">Declarado</span><span class="val">'+dec.toLocaleString('es-AR')+' kg</span></div>';
    html+='</div>';
    var ok=v.estado==='en-bruto';
    html+='<div style="background:'+(ok?'#E1F5EE':'#FAECE7')+';border-radius:8px;padding:16px;text-align:center;">';
    html+='<div style="font-weight:600;color:'+(ok?'#0F6E56':'#D85A30')+'">'+(ok?'Pesada aprobada':'Diferencia detectada')+'</div>';
    html+='<div style="font-size:28px;font-weight:700;color:'+(ok?'#0F6E56':'#D85A30')+';">'+signo+diff.toLocaleString('es-AR')+' kg</div>';
    html+='<div style="font-size:13px;color:#6b6b67;">'+signo+pct+'%</div></div>';
  }
  document.getElementById('detalle').innerHTML=html;
}
</script>
</body>
</html>
