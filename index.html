<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mis Viajes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gd:#0F6E56;--gm:#1D9E75;--gl:#E1F5EE;--gb:#9FE1CB;
  --am:#BA7517;--al:#FAEEDA;--rm:#D85A30;--rl:#FAECE7;--rb:#F5C4B3;
  --bm:#185FA5;--bl:#E6F1FB;--bb:#B5D4F4;
  --txt:#1a1a18;--txt2:#6b6b67;--bg:#f0ede8;--card:#ffffff;
  --brd:rgba(0,0,0,0.10);--r:12px;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--txt);font-size:16px;}
.header{background:var(--gd);padding:16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.header-logos{display:flex;align-items:center;gap:10px;}
.header-logos img{height:32px;width:auto;object-fit:contain;border-radius:5px;}
.hdiv{width:1px;height:26px;background:rgba(255,255,255,0.25);}
.hname{font-size:13px;color:rgba(255,255,255,0.9);font-weight:500;}
.hbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:5px 12px;font-size:12px;color:white;cursor:pointer;}
.sync-bar{display:flex;align-items:center;gap:6px;padding-top:6px;}
.sdot{width:6px;height:6px;border-radius:50%;background:#7FFFD4;}
.stxt{font-size:11px;color:rgba(255,255,255,0.8);}
.main{padding:16px;}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--card);border-radius:16px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.10);}
.login-logos{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;}
.login-logos img{height:38px;width:auto;object-fit:contain;border-radius:6px;}
.ldiv{width:1px;height:30px;background:rgba(0,0,0,0.15);}
.login-card h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px;}
.login-card p{font-size:14px;color:var(--txt2);text-align:center;margin-bottom:24px;}
.lbl{font-size:13px;font-weight:500;color:var(--txt2);display:block;margin-bottom:6px;}
.inp{width:100%;padding:14px;font-size:16px;border:1.5px solid rgba(0,0,0,0.2);border-radius:var(--r);background:var(--bg);color:var(--txt);margin-bottom:12px;}
.inp:focus{outline:none;border-color:var(--gm);}
.btn-login{width:100%;padding:15px;font-size:16px;font-weight:600;background:var(--gm);color:white;border:none;border-radius:var(--r);cursor:pointer;}
.btn-login:active{background:var(--gd);}
.err{margin-top:12px;padding:12px;border-radius:var(--r);font-size:13px;display:none;background:var(--rl);color:var(--rm);}
/* AVISOS */
.aviso{border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px;}
.av-seg{background:#FAECE7;border:1.5px solid #F5C4B3;}
.av-info{background:var(--bl);border:1.5px solid var(--bb);}
.av-urg{background:#FAEEDA;border:1.5px solid #F5A623;}
.av-icon{font-size:22px;flex-shrink:0;margin-top:2px;font-weight:700;}
.av-seg .av-icon{color:#D85A30;}
.av-info .av-icon{color:var(--bm);}
.av-urg .av-icon{color:#BA7517;}
.av-titulo{font-size:14px;font-weight:700;margin-bottom:3px;}
.av-seg .av-titulo{color:#D85A30;}
.av-info .av-titulo{color:var(--bm);}
.av-urg .av-titulo{color:#BA7517;}
.av-texto{font-size:13px;color:var(--txt);line-height:1.5;}
/* LISTA */
.vcard{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.vcard:active{transform:scale(0.98);}
.vc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vc-id{font-size:12px;font-weight:600;color:var(--gd);}
.vc-pat{font-size:18px;font-weight:700;margin-bottom:2px;}
.vc-dest{font-size:14px;color:var(--txt2);}
.vc-hora{font-size:13px;color:var(--gd);font-weight:600;margin-top:4px;}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.b-blue{background:var(--bl);color:var(--bm);}
.b-purple{background:#F3E8FF;color:#6B21A8;}
.b-warn{background:var(--al);color:var(--am);}
.b-danger{background:var(--rl);color:var(--rm);}
.b-ok{background:var(--gl);color:var(--gd);}
.b-gray{background:#e5e5e3;color:var(--txt2);}
.prog-wrap{margin-top:10px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-bottom:4px;}
.prog-bar{height:8px;background:#e5e5e3;border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--gm);}
.vc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.vc-fecha{font-size:12px;color:var(--txt2);}
.vc-ver{font-size:12px;color:var(--gd);font-weight:500;}
/* DETALLE */
.btn-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--gd);font-size:15px;font-weight:500;cursor:pointer;padding:0;margin-bottom:16px;}
.hora-box{background:var(--gd);border-radius:var(--r);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.hora-icon{font-size:28px;color:rgba(255,255,255,0.8);}
.hora-lbl{font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.hora-val{font-size:30px;font-weight:800;color:white;}
.ecard{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.ehdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.eicon{width:48px;height:48px;border-radius:50%;background:#f0f0ee;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.etit{font-size:17px;font-weight:700;}
.esub{font-size:13px;color:var(--txt2);margin-top:2px;}
.steps{display:flex;margin-bottom:14px;border-radius:var(--r);overflow:hidden;border:1px solid var(--brd);}
.step{flex:1;padding:8px 4px;text-align:center;font-size:10px;background:#f5f5f4;color:var(--txt2);display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--brd);}
.step:last-child{border-right:none;}
.step.done{background:var(--gl);color:var(--gd);}
.step.active{background:var(--gd);color:white;}
.step-icon{font-size:16px;font-weight:700;}
.isec{background:#f8f7f5;border-radius:var(--r);padding:14px;margin-bottom:12px;}
.isec-tit{font-size:12px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);}
.irow:last-child{border-bottom:none;}
.ilbl{font-size:13px;color:var(--txt2);}
.ival{font-size:14px;font-weight:600;color:var(--txt);text-align:right;}
.ritem{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;border-left:3px solid var(--gm);}
.dbox{border-radius:var(--r);padding:16px;margin-bottom:12px;text-align:center;}
.dbox-ok{background:var(--gl);border:1.5px solid var(--gb);}
.dbox-bad{background:var(--rl);border:1.5px solid var(--rb);}
.dnum{font-size:30px;font-weight:700;margin:6px 0 4px;}
/* BUEN VIAJE */
.bv-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 120px);padding:32px 24px;text-align:center;}
.bv-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:60px;}
.bv-circle-ok{background:var(--gl);border:4px solid var(--gm);}
.bv-circle-warn{background:#FAEEDA;border:4px solid #BA7517;}
.bv-tit{font-size:26px;font-weight:800;margin-bottom:8px;}
.bv-sub{font-size:15px;color:var(--txt2);margin-bottom:24px;}
.bv-datos{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:340px;margin-bottom:24px;}
.bv-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:14px;}
.bv-row:last-child{border-bottom:none;}
.btn-volver{background:var(--gm);color:white;border:none;border-radius:var(--r);padding:15px 32px;font-size:16px;font-weight:600;cursor:pointer;}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.cp{position:absolute;width:10px;height:10px;border-radius:2px;}
.empty{text-align:center;padding:40px 20px;color:var(--txt2);}
.upd{text-align:center;font-size:11px;color:var(--txt2);padding:8px 0 16px;}
.hidden{display:none!important;}
</style>
</head>

<script>
var SURL='https://cqdoritjnulopaysjlfg.supabase.co';
var SKEY='sb_publishable__n5ncv0PQuqcFftL8pT_RQ_IeV4gqSf';
var db=supabase.createClient(SURL,SKEY);
var chofer=null,viajes=[],remitos={},detalleId=null,rtCh=null;

// EVENTOS - todos con addEventListener, nunca onclick en HTML
document.getElementById('btnEntrar').addEventListener('click',buscarChofer);
document.getElementById('inputDni').addEventListener('keydown',function(e){if(e.key==='Enter')buscarChofer();});
document.getElementById('btnSalir').addEventListener('click',salir);
document.getElementById('btnVolver').addEventListener('click',volverLista);
document.getElementById('btnVolverLista').addEventListener('click',volverLista);

function mostrarErr(txt){
  var el=document.getElementById('loginError');
  el.textContent=txt;el.style.display='block';
}

function estadoInfo(estado){
  var m={
    'asignado':           {badge:'b-blue',  tit:'Viaje asignado',        sub:'Dirigite a bascula para el pesaje de tara.',prog:10,step:0},
    'espera-remitos':     {badge:'b-purple', tit:'Esperando remitos',     sub:'Logistica esta cargando los remitos.',prog:40,step:1},
    'en-remitos':         {badge:'b-purple', tit:'Cargando remitos',      sub:'Logistica esta registrando los remitos.',prog:45,step:1},
    'listo-bruto':        {badge:'b-warn',   tit:'Listo para pesaje bruto',sub:'Dirigite a bascula para el pesaje bruto.',prog:70,step:2},
    'en-bruto':           {badge:'b-warn',   tit:'Pesando bruto',         sub:'Se esta registrando el peso bruto.',prog:85,step:2},
    'pendiente-auth':     {badge:'b-danger', tit:'Diferencia detectada',  sub:'El Supervisor esta revisando el caso.',prog:90,step:3},
    'pendiente-gerente':  {badge:'b-danger', tit:'Diferencia critica',    sub:'Pendiente doble autorizacion.',prog:90,step:3},
    'pendiente-gerente-final':{badge:'b-purple',tit:'Pendiente Gerente',  sub:'El Gerente Industrial debe autorizar.',prog:95,step:3},
    'cerrado':            {badge:'b-ok',     tit:'Viaje cerrado',         sub:'Tu viaje fue cerrado correctamente.',prog:100,step:3}
  };
  return m[estado]||{badge:'b-gray',tit:estado,sub:'',prog:0,step:0};
}

async function buscarChofer(){
  var dni=document.getElementById('inputDni').value.toString().trim();
  var btn=document.getElementById('btnEntrar');
  var err=document.getElementById('loginError');
  err.style.display='none';
  if(!dni){mostrarErr('Ingresa tu DNI.');return;}
  btn.textContent='Buscando...';btn.disabled=true;
  try{
    var r=await db.from('choferes').select('*').eq('activo',true);
    if(r.error)throw new Error(r.error.message);
    var lista=r.data||[];
    var found=null;
    for(var i=0;i<lista.length;i++){
      if(String(lista[i].dni).trim()===dni){found=lista[i];break;}
    }
    if(!found){
      mostrarErr('DNI '+dni+' no encontrado. Consulta con el Administrador.');
      btn.textContent='Ver mis viajes';btn.disabled=false;
      return;
    }
    chofer=found;
    try{localStorage.setItem('chofer_dni',dni);}catch(e){}
    iniciarApp();
  }catch(e){
    mostrarErr('Error de conexion: '+e.message);
    btn.textContent='Ver mis viajes';btn.disabled=false;
  }
}

function iniciarApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  document.getElementById('headerNombre').textContent=chofer.nombre;
  iniciarRT();
  cargarViajes();
  cargarAvisos();
}

function salir(){
  if(rtCh)db.removeChannel(rtCh);
  chofer=null;viajes=[];remitos={};detalleId=null;
  try{localStorage.removeItem('chofer_dni');}catch(e){}
  document.getElementById('appScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('inputDni').value='';
  document.getElementById('btnEntrar').textContent='Ver mis viajes';
  document.getElementById('btnEntrar').disabled=false;
}

function iniciarRT(){
  if(rtCh)db.removeChannel(rtCh);
  rtCh=db.channel('rt-'+Date.now())
    .on('postgres_changes',{event:'*',schema:'public',table:'viajes'},function(){cargarViajes();})
    .on('postgres_changes',{event:'*',schema:'public',table:'remitos'},function(){cargarViajes();})
    .subscribe(function(s){
      var dot=document.getElementById('syncDot');
      var txt=document.getElementById('syncTxt');
      if(s==='SUBSCRIBED'){dot.style.background='#7FFFD4';txt.textContent='Conectado';}
      else{dot.style.background='#FFD700';txt.textContent='Reconectando...';setTimeout(function(){if(chofer)iniciarRT();},3000);}
    });
  if(window._poll)clearInterval(window._poll);
  window._poll=setInterval(function(){if(chofer)cargarViajes();},20000);
}

async function cargarAvisos(){
  var cont=document.getElementById('avisosContainer');
  if(!cont)return;
  try{
    var r=await db.from('avisos').select('*').eq('activo',true).order('created_at',{ascending:false});
    if(!r.data||!r.data.length){cont.innerHTML='';return;}
    var clsM={seguridad:'av-seg',info:'av-info',urgente:'av-urg'};
    var iconM={seguridad:'!',info:'i',urgente:'⚠'};
    var labelM={seguridad:'SEGURIDAD',info:'INFO',urgente:'URGENTE'};
    var html='';
    r.data.forEach(function(a){
      var cls=clsM[a.tipo]||'av-info';
      var icon=iconM[a.tipo]||'i';
      html+='<div class="aviso '+cls+'"><div class="av-icon">'+icon+'</div><div><div class="av-titulo">'+a.titulo+' <small style="font-size:10px;font-weight:500;">['+( labelM[a.tipo]||'INFO')+']</small></div><div class="av-texto">'+a.mensaje+'</div></div></div>';
    });
    cont.innerHTML=html;
  }catch(e){console.error(e);}
}

async function cargarViajes(){
  if(!chofer)return;
  try{
    var r=await db.from('viajes').select('*').eq('chofer',chofer.nombre).order('created_at',{ascending:false});
    var rd=await db.from('remitos').select('*');
    var todos=r.data||[];
    remitos={};
    (rd.data||[]).forEach(function(x){
      if(!remitos[x.viaje_id])remitos[x.viaje_id]=[];
      remitos[x.viaje_id].push(x);
    });
    if(detalleId){
      var v=todos.find(function(x){return x.id===detalleId;});
      if(v&&v.estado==='cerrado'){
        mostrarBuenViaje(v);detalleId=null;
        viajes=todos.filter(function(x){return x.estado!=='cerrado';});
        return;
      }
      if(v)renderDetalle(v);
    }
    viajes=todos.filter(function(x){return x.estado!=='cerrado';});
    var now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var ut='Actualizado: '+now;
    var e1=document.getElementById('updateTime');if(e1)e1.textContent=ut;
    var e2=document.getElementById('updateTimeDetalle');if(e2)e2.textContent=ut;
    if(!document.getElementById('vistaBuenViaje').classList.contains('hidden'))return;
    if(!detalleId)renderLista();
  }catch(e){console.error(e);}
}

function renderLista(){
  var cont=document.getElementById('viajesContainer');
  if(!viajes.length){
    cont.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px;">&#128666;</div><h3 style="font-size:18px;font-weight:600;margin-bottom:6px;">Sin viajes activos</h3><p>No tenes viajes asignados en este momento.</p></div>';
    return;
  }
  var html='';
  viajes.forEach(function(v){
    var ei=estadoInfo(v.estado);
    var fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
    html+='<div class="vcard" data-id="'+v.id+'">';
    html+='<div class="vc-top"><span class="vc-id">'+(v.id_viaje||'—')+'</span><span class="badge '+ei.badge+'">'+ei.tit+'</span></div>';
    html+='<div class="vc-pat">'+v.patente+(v.patente_acoplado?' / '+v.patente_acoplado:'')+'</div>';
    html+='<div class="vc-dest">&#128205; '+v.destino+'</div>';
    if(v.hora_ingreso)html+='<div class="vc-hora">&#128336; Ingreso estimado: '+v.hora_ingreso+'</div>';
    html+='<div class="prog-wrap"><div class="prog-lbl"><span>Progreso</span><span>'+ei.prog+'%</span></div>';
    html+='<div class="prog-bar"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div></div>';
    html+='<div class="vc-foot"><span class="vc-fecha">&#128197; '+fecha+'</span><span class="vc-ver">Ver detalle &#8250;</span></div>';
    html+='</div>';
  });
  cont.innerHTML=html;
  // Add click events
  var cards=cont.querySelectorAll('.vcard');
  cards.forEach(function(card){
    card.addEventListener('click',function(){verDetalle(this.getAttribute('data-id'));});
  });
}

function verDetalle(id){
  detalleId=id;
  var v=viajes.find(function(x){return x.id===id;});
  if(!v)return;
  document.getElementById('vistaLista').classList.add('hidden');
  document.getElementById('vistaDetalle').classList.remove('hidden');
  renderDetalle(v);
}

function volverLista(){
  detalleId=null;
  document.getElementById('vistaDetalle').classList.add('hidden');
  document.getElementById('vistaBuenViaje').classList.add('hidden');
  document.getElementById('vistaLista').classList.remove('hidden');
  renderLista();
}

function renderDetalle(v){
  var ei=estadoInfo(v.estado);
  var rems=remitos[v.id]||[];
  var dec=rems.reduce(function(s,r){return s+Number(r.peso);},0);
  var neto=Number(v.bruto)-Number(v.tara);
  var diff=neto-dec;
  var absDiff=Math.abs(diff);
  var pct=dec>0?((absDiff/dec)*100).toFixed(2):'0.00';
  var signo=diff>=0?'+':'';
  var fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
  var stepIcons=['&#9881;','&#128196;','&#9878;','&#128737;'];
  var stepLabels=['Tara','Remitos','Bruto','Control'];
  var steps='';
  for(var i=0;i<4;i++){
    var cls=i<ei.step?'done':i===ei.step?'active':'';
    steps+='<div class="step '+cls+'"><div class="step-icon">'+stepIcons[i]+'</div><span>'+stepLabels[i]+'</span></div>';
  }
  var html='';
  if(v.hora_ingreso){
    html+='<div class="hora-box"><div class="hora-icon">&#128336;</div><div><div class="hora-lbl">Hora estimada de ingreso a planta</div><div class="hora-val">'+v.hora_ingreso+'</div></div></div>';
  }
  html+='<div class="ecard">';
  html+='<div class="ehdr"><div class="eicon">&#128666;</div><div><div class="etit">'+ei.tit+'</div><div class="esub">'+ei.sub+'</div></div></div>';
  html+='<div class="prog-wrap"><div class="prog-lbl"><span>Progreso del viaje</span><span>'+ei.prog+'%</span></div>';
  html+='<div class="prog-bar"><div class="prog-fill" style="width:'+ei.prog+'%"></div></div></div>';
  html+='<div class="steps">'+steps+'</div>';
  html+='</div>';
  html+='<div class="isec"><div class="isec-tit">Datos del viaje</div>';
  html+='<div class="irow"><span class="ilbl">ID Viaje</span><span class="ival">'+(v.id_viaje||'—')+'</span></div>';
  html+='<div class="irow"><span class="ilbl">Patente tractora</span><span class="ival">'+v.patente+'</span></div>';
  if(v.patente_acoplado)html+='<div class="irow"><span class="ilbl">Patente acoplado</span><span class="ival">'+v.patente_acoplado+'</span></div>';
  html+='<div class="irow"><span class="ilbl">Destino</span><span class="ival">'+v.destino+'</span></div>';
  html+='<div class="irow"><span class="ilbl">Fecha</span><span class="ival">'+fecha+'</span></div>';
  if(v.obs)html+='<div class="irow"><span class="ilbl">Observaciones</span><span class="ival">'+v.obs+'</span></div>';
  html+='</div>';
  if(Number(v.tara)>0){
    html+='<div class="isec"><div class="isec-tit">Pesaje de tara</div>';
    html+='<div class="irow"><span class="ilbl">Peso tara</span><span class="ival">'+Number(v.tara).toLocaleString('es-AR')+' kg</span></div>';
    html+='</div>';
  }
  if(rems.length){
    html+='<div class="isec"><div class="isec-tit">Remitos ('+rems.length+')</div>';
    rems.forEach(function(r){
      html+='<div class="ritem"><div style="font-size:12px;color:var(--txt2);">Remito '+r.num+'</div>';
      html+='<div style="font-size:15px;font-weight:600;">'+r.producto+'</div>';
      html+='<div style="font-size:14px;color:var(--gd);font-weight:500;">'+Number(r.peso).toLocaleString('es-AR')+' kg</div></div>';
    });
    html+='<div class="irow" style="margin-top:8px;"><span class="ilbl" style="font-weight:600;">Total declarado</span><span class="ival" style="color:var(--gd);">'+dec.toLocaleString('es-AR')+' kg</span></div>';
    html+='</div>';
  }
  if(Number(v.bruto)>0){
    html+='<div class="isec"><div class="isec-tit">Pesaje bruto</div>';
    html+='<div class="irow"><span class="ilbl">Peso bruto</span><span class="ival">'+Number(v.bruto).toLocaleString('es-AR')+' kg</span></div>';
    html+='<div class="irow"><span class="ilbl">Peso neto real</span><span class="ival">'+neto.toLocaleString('es-AR')+' kg</span></div>';
    html+='<div class="irow"><span class="ilbl">Peso declarado</span><span class="ival">'+dec.toLocaleString('es-AR')+' kg</span></div>';
    html+='</div>';
    var ok=v.estado==='en-bruto';
    html+='<div class="dbox '+(ok?'dbox-ok':'dbox-bad')+'">';
    html+='<div style="font-size:13px;font-weight:600;color:'+(ok?'var(--gd)':'var(--rm)')+';">'+(ok?'Pesada aprobada':'Diferencia detectada')+'</div>';
    html+='<div class="dnum" style="color:'+(ok?'var(--gd)':'var(--rm)')+';">'+signo+diff.toLocaleString('es-AR')+' kg</div>';
    html+='<div style="font-size:13px;color:var(--txt2);">'+signo+pct+'% respecto a lo declarado</div>';
    if(!ok)html+='<div style="font-size:12px;margin-top:8px;color:var(--rm);">El Supervisor/Gerente esta revisando el caso.</div>';
    html+='</div>';
  }
  document.getElementById('detalleContainer').innerHTML=html;
}

function mostrarBuenViaje(v){
  document.getElementById('vistaLista').classList.add('hidden');
  document.getElementById('vistaDetalle').classList.add('hidden');
  document.getElementById('vistaBuenViaje').classList.remove('hidden');
  var rems=remitos[v.id]||[];
  var dec=rems.reduce(function(s,r){return s+Number(r.peso);},0);
  var neto=Number(v.bruto)-Number(v.tara);
  var fecha=v.fecha?new Date(v.fecha+'T12:00:00').toLocaleDateString('es-AR'):'—';
  var ok=Math.abs(neto-dec)<=(dec*0.005)||neto===dec;
  var circ=document.getElementById('bvCircle');
  if(ok){
    circ.className='bv-circle bv-circle-ok';circ.style.color='var(--gd)';
    document.getElementById('bvTitulo').textContent='Buen viaje!';
    document.getElementById('bvTitulo').style.color='var(--gd)';
    document.getElementById('bvSub').textContent='Tu viaje fue procesado y cerrado correctamente.';
    lanzarConfetti();
  }else{
    circ.className='bv-circle bv-circle-warn';circ.style.color='#BA7517';
    document.getElementById('bvTitulo').textContent='Viaje autorizado';
    document.getElementById('bvTitulo').style.color='#BA7517';
    document.getElementById('bvSub').textContent='Tu viaje fue cerrado con diferencia de peso autorizada.';
  }
  var datos='';
  datos+='<div class="bv-row"><span style="color:var(--txt2);">ID Viaje</span><span style="font-weight:600;">'+(v.id_viaje||'—')+'</span></div>';
  datos+='<div class="bv-row"><span style="color:var(--txt2);">Patente</span><span style="font-weight:600;">'+v.patente+'</span></div>';
  datos+='<div class="bv-row"><span style="color:var(--txt2);">Destino</span><span style="font-weight:600;">'+v.destino+'</span></div>';
  datos+='<div class="bv-row"><span style="color:var(--txt2);">Fecha</span><span style="font-weight:600;">'+fecha+'</span></div>';
  if(Number(v.bruto)>0)datos+='<div class="bv-row"><span style="color:var(--txt2);">Peso neto</span><span style="font-weight:600;">'+neto.toLocaleString('es-AR')+' kg</span></div>';
  document.getElementById('bvDatos').innerHTML=datos;
}

function lanzarConfetti(){
  var wrap=document.getElementById('confettiWrap');wrap.innerHTML='';
  var cols=['#1D9E75','#0F6E56','#FFD700','#FF6B6B','#4ECDC4'];
  for(var i=0;i<60;i++){
    var p=document.createElement('div');p.className='cp';
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.width=(Math.random()*10+5)+'px';p.style.height=(Math.random()*10+5)+'px';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    p.style.animation='confettiFall '+(Math.random()*2+1.5)+'s '+(Math.random()*1.5)+'s linear forwards';
    wrap.appendChild(p);
  }
  setTimeout(function(){wrap.innerHTML='';},4000);
}

// RESTAURAR SESION
window.addEventListener('load',function(){
  var dni=null;
  try{dni=localStorage.getItem('chofer_dni');}catch(e){}
  if(dni){
    document.getElementById('inputDni').value=dni;
    db.from('choferes').select('*').eq('activo',true).then(function(r){
      if(r.data){
        var found=null;
        for(var i=0;i<r.data.length;i++){
          if(String(r.data[i].dni).trim()===dni){found=r.data[i];break;}
        }
        if(found){chofer=found;iniciarApp();}
        else{try{localStorage.removeItem('chofer_dni');}catch(e){}}
      }
    });
  }
});

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&chofer)cargarViajes();
});

// Agregar keyframe para confetti
var style=document.createElement('style');
style.textContent='@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
document.head.appendChild(style);
</script>
